name: Lint on Pull Request

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: flyin-editor.cheznestor.fr/package-lock.json

      - name: Install dependencies
        working-directory: flyin-editor.cheznestor.fr
        run: npm ci

      - name: Run lint
        working-directory: flyin-editor.cheznestor.fr
        run: npm run lint