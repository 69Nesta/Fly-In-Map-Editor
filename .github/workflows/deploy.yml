name: Deploy to cPanel

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: flyin-editor.cheznestor.fr/package-lock.json

      - name: Install dependencies
        working-directory: flyin-editor.cheznestor.fr
        run: npm ci

      - name: Run typecheck
        working-directory: flyin-editor.cheznestor.fr
        run: npm run typecheck

      - name: Build application
        working-directory: flyin-editor.cheznestor.fr
        run: npm run build

      - name: Prepare deploy bundle
        working-directory: flyin-editor.cheznestor.fr
        run: |
          rm -rf ../deploy
          mkdir -p ../deploy
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude '.vscode' \
            build/ ../deploy/
          cp package.json package-lock.json ../deploy/

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: flyin-editor.cheznestor.fr/deploy
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: deploy

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Trust the cPanel host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to cPanel
        run: |
          ssh -p "${{ secrets.CPANEL_SSH_PORT }}" "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "mkdir -p '${{ secrets.CPANEL_DEPLOY_PATH }}/build'"
          rsync -az --delete \
            -e "ssh -p ${{ secrets.CPANEL_SSH_PORT }}" \
            deploy/ \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_DEPLOY_PATH }}/build/"

      - name: Install dependencies, run migrations, and restart
        run: |
          ssh -p "${{ secrets.CPANEL_SSH_PORT }}" "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "cd '${{ secrets.CPANEL_DEPLOY_PATH }}/build' && npm ci --omit=dev && node ace migration:run --force && mkdir -p tmp && touch tmp/restart.txt"